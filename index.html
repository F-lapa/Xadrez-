<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez - Modo Fernando Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .login-screen {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #333;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .login-screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-screen p {
            margin-bottom: 40px;
            opacity: 0.7;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 20px;
            font-size: 1.3em;
            border: 3px solid #444;
            background: #0a0a0a;
            color: white;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.2em;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            white-space: pre-line;
        }

        .status-message.waiting {
            display: block;
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            animation: pulse 2s infinite;
        }

        .status-message.error {
            display: block;
            background: rgba(255,0,0,0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .player-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #333;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .player-badge.fernando {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000;
            font-weight: bold;
            animation: fernando-glow 2s infinite;
        }

        @keyframes fernando-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,255,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(0,255,0,0.8); }
        }

        .turn-indicator {
            margin-top: 15px;
            padding: 15px 30px;
            background: #222;
            border-radius: 25px;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .turn-indicator.your-turn {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            animation: glow 1.5s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.8); }
        }

        .board-container {
            position: relative;
            margin: 20px 0;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, min(11vw, 80px));
            grid-template-rows: repeat(8, min(11vw, 80px));
            border: 4px solid #444;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .square {
            width: min(11vw, 80px);
            height: min(11vw, 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(8vw, 55px);
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.2s;
        }

        .light { background: #f0d9b5; color: #000; }
        .dark { background: #b58863; color: #000; }

        .selected {
            background: rgba(255, 215, 0, 0.8) !important;
        }

        .valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
        }

        .valid-capture {
            box-shadow: inset 0 0 0 4px rgba(255,0,0,0.6);
        }

        .last-move {
            box-shadow: inset 0 0 0 4px #0066ff;
        }

        .check {
            animation: check-pulse 1s infinite;
            background: rgba(255,0,0,0.4) !important;
        }

        @keyframes check-pulse {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255,0,0,0.8); }
            50% { box-shadow: inset 0 0 40px rgba(255,0,0,1); }
        }

        .hint-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,0,0.6) 0%, rgba(0,255,0,0.2) 50%, transparent 70%);
            animation: hint-pulse 2s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes hint-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }

        .hint-circle {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: circle-pulse 1.5s infinite;
            z-index: 11;
            pointer-events: none;
            box-shadow: 0 0 20px #00ff00, inset 0 0 20px rgba(0,255,0,0.3);
        }

        @keyframes circle-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        .hint-arrow {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 12;
            pointer-events: none;
            filter: drop-shadow(0 0 10px #00ff00);
        }

        .arrow-up {
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #00ff00;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-down {
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid #00ff00;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-left {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 20px solid #00ff00;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        .arrow-right {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #00ff00;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        @keyframes arrow-bounce-h {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(-8px); }
        }

        .hint-target {
            position: absolute;
            width: 70%;
            height: 70%;
            border: 3px dashed #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 3s linear infinite;
            z-index: 11;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .hint-trail {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            transform-origin: left center;
            z-index: 9;
            pointer-events: none;
            box-shadow: 0 0 10px #00ff00;
            border-radius: 2px;
            opacity: 0.8;
        }

        .danger-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.7) 0%, rgba(255,0,0,0.3) 50%, transparent 70%);
            animation: danger-flash 0.5s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes danger-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .threat-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,165,0,0.6) 0%, rgba(255,165,0,0.2) 50%, transparent 70%);
            animation: threat-pulse 1.5s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes threat-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .killer-move {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,255,0.7) 0%, rgba(255,0,255,0.3) 50%, transparent 70%);
            animation: killer-pulse 1s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes killer-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            text-align: center;
        }

        .modal-content h2 {
            font-size: 2.5em;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .promotion-options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .promotion-piece {
            font-size: 60px;
            padding: 20px;
            background: #1a1a1a;
            border: 3px solid #444;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .promotion-piece:hover {
            border-color: #ffd700;
            transform: scale(1.2);
            background: #2a2a2a;
        }

        .coordinates {
            display: flex;
            justify-content: space-around;
            width: min(88vw, 640px);
            margin-top: 10px;
            font-weight: bold;
            color: #666;
        }

        .game-info {
            margin-top: 20px;
            padding: 15px 30px;
            background: #1a1a1a;
            border-radius: 15px;
            text-align: center;
        }

        .captured-pieces {
            font-size: 30px;
            min-height: 40px;
        }

        .ai-analysis {
            margin-top: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border: 2px solid #00ff00;
            border-radius: 15px;
            max-width: 640px;
            width: 100%;
            display: none;
        }

        .ai-analysis.show {
            display: block;
            animation: slide-in 0.5s ease;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-analysis h3 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .ai-suggestion {
            font-size: 1.1em;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0,255,0,0.1);
            border-radius: 8px;
            border-left: 4px solid #00ff00;
        }

        .ai-reasoning {
            font-size: 0.9em;
            color: #aaa;
            line-height: 1.5;
        }

        .threat-warning {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,0,0,0.2);
            border-radius: 8px;
            border-left: 4px solid #ff0000;
            color: #ff6666;
            font-weight: bold;
        }

        .best-move-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .best-move-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .win-message {
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0,255,0,0.5);
        }

        .lose-message {
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        @media (max-width: 600px) {
            .login-screen { padding: 30px 20px; }
            .login-screen h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <h1>♔ Xadrez ♚</h1>
        <p>Digite seu nome para começar</p>
        <div class="input-group">
            <input type="text" id="playerName" placeholder="Seu nome" maxlength="20" autocomplete="off">
        </div>
        <button class="btn" id="joinBtn" onclick="joinGame()">Entrar no Jogo</button>
        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <h2 id="playerNameDisplay">Jogador</h2>
            <span class="player-badge" id="playerBadge">Aguardando...</span>
            <div class="turn-indicator" id="turnIndicator">Aguardando início...</div>
        </div>
        <div class="board-container">
            <div id="chessboard"></div>
        </div>
        <div class="coordinates">
            <span>a</span><span>b</span><span>c</span><span>d</span>
            <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
        <div class="game-info">
            <div>Peças capturadas: <span id="capturedPieces" class="captured-pieces"></span></div>
        </div>
        <div class="ai-analysis" id="aiAnalysis">
            <h3>🧠 Análise IA Fernando</h3>
            <div class="ai-suggestion" id="aiSuggestion"></div>
            <div class="ai-reasoning" id="aiReasoning"></div>
            <div class="threat-warning" id="threatWarning" style="display:none;"></div>
            <button class="best-move-btn" id="bestMoveBtn" onclick="executeBestMove()" style="display:none;">
                ♔ Executar Melhor Jogada
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="gameOverModal">
        <div class="modal-content">
            <h2 id="gameOverText">Fim de Jogo!</h2>
            <button class="btn" onclick="location.reload()">Novo Jogo</button>
        </div>
    </div>

    <div class="modal-overlay" id="promotionModal">
        <div class="modal-content">
            <h2>Promover peão para:</h2>
            <div class="promotion-options" id="promotionOptions"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDCjrg7g-E_sxQz3cUZyg_W_75ZKsqpaYw",
            authDomain: "xadrez-3a4af.firebaseapp.com",
            projectId: "xadrez-3a4af",
            storageBucket: "xadrez-3a4af.firebasestorage.app",
            messagingSenderId: "595655273304",
            appId: "1:595655273304:web:a29cf5845830151e34532d",
            measurementId: "G-7T8GW789VC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Game State
        const PIECES = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        const PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
        
        let gameState = {
            board: [],
            currentPlayer: 'white',
            players: { white: null, black: null },
            gameId: null,
            myColor: null,
            myName: null,
            isFernando: false,
            selectedSquare: null,
            validMoves: [],
            castlingRights: { white: {kingSide: true, queenSide: true}, black: {kingSide: true, queenSide: true} },
            enPassantTarget: null,
            lastMove: null,
            kingPositions: { white: {row: 7, col: 4}, black: {row: 0, col: 4} },
            capturedPieces: { white: [], black: [] },
            status: 'waiting',
            amPlayer1: false,
            moveHistory: [],
            currentBestMove: null
        };

        let gameRef = null;
        let unsubscribe = null;
        let lastAnalysisTime = 0;

        // FUNÇÕES DE CONVERSÃO DO TABULEIRO
        
        function boardToFirestore(board2D) {
            const boardObj = {};
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board2D[r] && board2D[r][c];
                    if (piece) {
                        boardObj[`${r}-${c}`] = piece;
                    }
                }
            }
            return boardObj;
        }

        function boardFromFirestore(boardObj) {
            const board = Array(8).fill(null).map(() => Array(8).fill(null));
            if (!boardObj || typeof boardObj !== 'object') return board;
            
            for (let key in boardObj) {
                if (boardObj.hasOwnProperty(key)) {
                    const [r, c] = key.split('-').map(Number);
                    if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                        board[r][c] = boardObj[key];
                    }
                }
            }
            return board;
        }

        function capturedPiecesToFirestore(captured) {
            return {
                white: captured.white ? captured.white.join(',') : '',
                black: captured.black ? captured.black.join(',') : ''
            };
        }

        function capturedPiecesFromFirestore(captured) {
            return {
                white: captured.white ? captured.white.split(',').filter(p => p) : [],
                black: captured.black ? captured.black.split(',').filter(p => p) : []
            };
        }

        function getGameId() {
            const params = new URLSearchParams(window.location.search);
            let gameId = params.get('game');
            
            if (!gameId) {
                gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
                window.history.replaceState({}, '', `?game=${gameId}`);
            }
            
            return gameId;
        }

        function showStatus(message, type = 'waiting') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
        }

        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                showStatus('Digite seu nome!', 'error');
                return;
            }
            const btn = document.getElementById('joinBtn');
            btn.disabled = true;
            btn.textContent = 'Conectando...';
            gameState.myName = name;
            gameState.isFernando = name.toLowerCase() === 'fernando';
            gameState.gameId = getGameId();
            connectToGame();
        }

        function connectToGame() {
            gameRef = db.collection('games').doc(gameState.gameId);
            
            gameRef.get().then(doc => {
                if (!doc.exists) {
                    gameState.amPlayer1 = true;
                    gameState.myColor = 'white';
                    createNewGame();
                } else {
                    const game = doc.data();
                    const hasWhite = game.players && game.players.white;
                    const hasBlack = game.players && game.players.black;
                    
                    if (hasWhite && !hasBlack) {
                        gameState.amPlayer1 = false;
                        gameState.myColor = 'black';
                        joinExistingGame(game);
                    } else if (!hasWhite && hasBlack) {
                        gameState.amPlayer1 = true;
                        gameState.myColor = 'white';
                        joinAsWhitePlayer(game);
                    } else if (hasWhite && hasBlack) {
                        showStatus('Jogo já está cheio! Crie um novo jogo.', 'error');
                        document.getElementById('joinBtn').disabled = false;
                        document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
                        
                        setTimeout(() => {
                            if (confirm('Jogo cheio. Criar novo jogo?')) {
                                window.location.search = '';
                                location.reload();
                            }
                        }, 100);
                    } else {
                        gameState.amPlayer1 = true;
                        gameState.myColor = 'white';
                        createNewGame();
                    }
                }
            }).catch(error => {
                console.error('Erro ao conectar:', error);
                showStatus('Erro de conexão: ' + error.message, 'error');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
            });
        }

        function createNewGame() {
            const initialBoard = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];

            const boardObj = boardToFirestore(initialBoard);
            const capturedObj = capturedPiecesToFirestore({ white: [], black: [] });

            const gameData = {
                board: boardObj,
                currentPlayer: 'white',
                players: {
                    white: { 
                        name: gameState.myName, 
                        isFernando: gameState.isFernando,
                        connected: true,
                        joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    black: null
                },
                status: 'waiting',
                castlingRights: {

        function setupGameListener() {
            if (!gameRef) return;
            
            unsubscribe = gameRef.onSnapshot(doc => {
                if (!doc.exists) return;
                
                const data = doc.data();
                
                // Verificar se o rei foi capturado
                const myKing = gameState.myColor === 'white' ? 'K' : 'k';
                const opponentKing = gameState.myColor === 'white' ? 'k' : 'K';
                const board = boardFromFirestore(data.board);
                
                let myKingExists = false;
                let opponentKingExists = false;
                
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (board[r] && board[r][c] === myKing) myKingExists = true;
                        if (board[r] && board[r][c] === opponentKing) opponentKingExists = true;
                    }
                }
                
                if (!myKingExists && gameState.status !== 'ended') {
                    gameState.status = 'ended';
                    gameState.winner = gameState.myColor === 'white' ? 'black' : 'white';
                    showGameOver(gameState.winner, true);
                    return;
                }
                
                if (!opponentKingExists && gameState.status !== 'ended') {
                    gameState.status = 'ended';
                    gameState.winner = gameState.myColor;
                    showGameOver(gameState.winner, false);
                    return;
                }
                
                gameState.board = board;
                gameState.currentPlayer = data.currentPlayer || 'white';
                gameState.players = data.players || gameState.players;
                gameState.castlingRights = data.castlingRights || gameState.castlingRights;
                gameState.enPassantTarget = data.enPassantTarget;
                gameState.lastMove = data.lastMove;
                gameState.capturedPieces = capturedPiecesFromFirestore(data.capturedPieces || { white: '', black: '' });
                gameState.kingPositions = data.kingPositions || gameState.kingPositions;
                gameState.status = data.status || 'waiting';
                gameState.moveHistory = data.moveHistory || [];

                if (data.status === 'playing' && gameState.amPlayer1 && 
                    document.getElementById('loginScreen').style.display !== 'none') {
                    document.getElementById('statusMessage').style.display = 'none';
                    startGame();
                }

                if (data.status === 'ended' && data.winner) {
                    const iLost = data.winner !== gameState.myColor && data.winner !== 'draw';
                    showGameOver(data.winner, iLost);
                }

                renderBoard();
                updateTurnIndicator();
                
                // Atualizar análise da IA para Fernando (com throttle)
                if (gameState.isFernando && gameState.status === 'playing' && 
                    gameState.currentPlayer === gameState.myColor) {
                    const now = Date.now();
                    if (now - lastAnalysisTime > 500) { // Máximo 2 análises por segundo
                        lastAnalysisTime = now;
                        setTimeout(() => updateAIAnalysis(), 100);
                    }
                }
            }, error => {
                console.error('Erro no listener:', error);
            });
        }

        function updateTurnIndicator() {
