<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez - Modo Fernando Pro Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .login-screen {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #333;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .login-screen p {
            margin-bottom: 40px;
            opacity: 0.7;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 20px;
            font-size: 1.3em;
            border: 3px solid #444;
            background: #0a0a0a;
            color: white;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #444, #666);
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: linear-gradient(45deg, #555, #777);
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            white-space: pre-line;
            animation: pulse 2s infinite;
        }

        .status-message.waiting {
            display: block;
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .status-message.error {
            display: block;
            background: rgba(255,0,0,0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.5s ease;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .game-header h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .player-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #333;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }

        .player-badge.fernando {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000;
            font-weight: bold;
            animation: fernando-glow 2s infinite;
        }

        @keyframes fernando-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,255,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(0,255,0,0.8); }
        }

        .turn-indicator {
            margin-top: 15px;
            padding: 15px 30px;
            background: #222;
            border-radius: 25px;
            font-size: 1.2em;
            transition: all 0.3s;
            display: inline-block;
        }

        .turn-indicator.your-turn {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            animation: glow 1.5s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.8); }
        }

        .board-container {
            position: relative;
            margin: 20px 0;
            background: #000;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, min(11vw, 80px));
            grid-template-rows: repeat(8, min(11vw, 80px));
            border: 4px solid #444;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .square {
            width: min(11vw, 80px);
            height: min(11vw, 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(8vw, 55px);
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.2s;
        }

        .light { background: #f0d9b5; color: #000; }
        .dark { background: #b58863; color: #000; }

        .selected {
            background: rgba(255, 215, 0, 0.8) !important;
            box-shadow: inset 0 0 20px rgba(255,215,0,0.5);
        }

        .valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
        }

        .valid-capture {
            box-shadow: inset 0 0 0 4px rgba(255,0,0,0.6);
            animation: capture-pulse 1s infinite;
        }

        @keyframes capture-pulse {
            0%, 100% { box-shadow: inset 0 0 0 4px rgba(255,0,0,0.6); }
            50% { box-shadow: inset 0 0 0 6px rgba(255,0,0,0.8); }
        }

        .last-move {
            box-shadow: inset 0 0 0 4px #0066ff;
        }

        .check {
            animation: check-pulse 1s infinite;
            background: rgba(255,0,0,0.4) !important;
        }

        @keyframes check-pulse {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255,0,0,0.8); }
            50% { box-shadow: inset 0 0 40px rgba(255,0,0,1); }
        }

        /* NOVOS ESTILOS PARA DICAS AVANÇADAS - FOCO EM SEGURANÇA */
        .safety-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,255,0.6) 0%, rgba(0,255,255,0.2) 50%, transparent 70%);
            animation: safety-pulse 2s infinite;
            z-index: 10;
            pointer-events: none;
            border-radius: 50%;
        }

        @keyframes safety-pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .ultra-safe {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #00ffff;
            border-radius: 50%;
            animation: ultra-safe-pulse 1.5s infinite;
            z-index: 11;
            pointer-events: none;
            box-shadow: 0 0 20px #00ffff, inset 0 0 20px rgba(0,255,255,0.3);
        }

        @keyframes ultra-safe-pulse {
            0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 20px #00ffff; }
            50% { transform: scale(1.15); opacity: 0.7; box-shadow: 0 0 40px #00ffff; }
        }

        .defended-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            border: 2px solid white;
            z-index: 15;
            box-shadow: 0 0 5px #00ff00;
        }

        .threat-indicator {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.7) 0%, rgba(255,0,0,0.3) 50%, transparent 70%);
            animation: threat-flash 0.8s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes threat-flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        .danger-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255,0,0,0.1),
                rgba(255,0,0,0.1) 10px,
                rgba(255,0,0,0.2) 10px,
                rgba(255,0,0,0.2) 20px
            );
            animation: danger-zone-pulse 2s infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes danger-zone-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .blunder-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            animation: blunder-bounce 1s infinite;
        }

        @keyframes blunder-bounce {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-5px); }
        }

        .hint-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,0,0.6) 0%, rgba(0,255,0,0.2) 50%, transparent 70%);
            animation: hint-pulse 2s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes hint-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }

        .hint-circle {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: circle-pulse 1.5s infinite;
            z-index: 11;
            pointer-events: none;
            box-shadow: 0 0 20px #00ff00, inset 0 0 20px rgba(0,255,0,0.3);
        }

        @keyframes circle-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        .hint-arrow {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 12;
            pointer-events: none;
            filter: drop-shadow(0 0 10px #00ff00);
        }

        .arrow-up {
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #00ff00;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-down {
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid #00ff00;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-left {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 20px solid #00ff00;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        .arrow-right {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #00ff00;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        @keyframes arrow-bounce-h {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(-8px); }
        }

        .hint-target {
            position: absolute;
            width: 70%;
            height: 70%;
            border: 3px dashed #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 3s linear infinite;
            z-index: 11;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .hint-trail {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            transform-origin: left center;
            z-index: 9;
            pointer-events: none;
            box-shadow: 0 0 10px #00ff00;
            border-radius: 2px;
            opacity: 0.8;
        }

        .killer-move {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,255,0.7) 0%, rgba(255,0,255,0.3) 50%, transparent 70%);
            animation: killer-pulse 1s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes killer-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            text-align: center;
            animation: modal-in 0.3s ease;
        }

        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h2 {
            font-size: 2.5em;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .promotion-options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .promotion-piece {
            font-size: 60px;
            padding: 20px;
            background: #1a1a1a;
            border: 3px solid #444;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .promotion-piece:hover {
            border-color: #ffd700;
            transform: scale(1.2);
            background: #2a2a2a;
        }

        .coordinates {
            display: flex;
            justify-content: space-around;
            width: min(88vw, 640px);
            margin-top: 10px;
            font-weight: bold;
            color: #666;
        }

        .game-info {
            margin-top: 20px;
            padding: 15px 30px;
            background: #1a1a1a;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 640px;
        }

        .captured-pieces {
            font-size: 30px;
            min-height: 40px;
        }

        .ai-analysis {
            margin-top: 15px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border: 2px solid #00ff00;
            border-radius: 15px;
            max-width: 640px;
            width: 100%;
            display: none;
            animation: slide-in 0.5s ease;
        }

        .ai-analysis.show {
            display: block;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-analysis h3 {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 1.3em;
            text-shadow: 0 0 10px rgba(0,255,0,0.3);
        }

        .ai-suggestion {
            font-size: 1.1em;
            margin-bottom: 10px;
            padding: 15px;
            background: rgba(0,255,0,0.1);
            border-radius: 8px;
            border-left: 4px solid #00ff00;
            transition: all 0.3s;
        }

        .ai-suggestion.warning {
            background: rgba(255,170,0,0.1);
            border-left-color: #ffaa00;
            color: #ffcc66;
        }

        .ai-suggestion.critical {
            background: rgba(255,0,0,0.2);
            border-left-color: #ff0000;
            color: #ff0000;
            animation: critical-pulse 1s infinite;
        }

        .ai-suggestion.safe {
            background: rgba(0,255,255,0.1);
            border-left-color: #00ffff;
            color: #00ffff;
        }

        @keyframes critical-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,0,0,0.3); }
            50% { box-shadow: 0 0 20px rgba(255,0,0,0.6); }
        }

        .ai-reasoning {
            font-size: 0.95em;
            color: #aaa;
            line-height: 1.6;
            margin-top: 10px;
        }

        .threat-list {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,0,0,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,0,0,0.2);
        }

        .threat-item {
            color: #ff6666;
            margin: 5px 0;
            font-size: 0.9em;
        }

        .safety-meter {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .safety-bar {
            height: 20px;
            background: linear-gradient(90deg, #ff0000 0%, #ffff00 50%, #00ff00 100%);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .safety-indicator {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transition: left 0.5s ease;
        }

        .safety-label {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.8em;
            color: #888;
        }

        .suggestion-list {
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 12px;
            margin: 5px 0;
            background: rgba(0,255,255,0.05);
            border-radius: 8px;
            border-left: 3px solid #00ffff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: rgba(0,255,255,0.15);
            transform: translateX(5px);
        }

        .suggestion-item.safe-option {
            border-left-color: #00ff00;
            background: rgba(0,255,0,0.08);
        }

        .suggestion-item.safe-option:hover {
            background: rgba(0,255,0,0.15);
        }

        .suggestion-item.risky {
            border-left-color: #ffaa00;
            background: rgba(255,170,0,0.05);
        }

        .suggestion-item.blunder {
            border-left-color: #ff0000;
            background: rgba(255,0,0,0.05);
            opacity: 0.7;
        }

        .suggestion-score {
            font-size: 0.8em;
            color: #888;
        }

        .safety-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 8px;
        }

        .safety-badge.ultra {
            background: #00ffff;
            color: #000;
        }

        .safety-badge.safe {
            background: #00ff00;
            color: #000;
        }

        .safety-badge.risky {
            background: #ffaa00;
            color: #000;
        }

        .opponent-analysis {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,0,0,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,0,0,0.2);
        }

        .opponent-analysis h4 {
            color: #ff6666;
            margin-bottom: 10px;
        }

        /* ANIMAÇÃO ESPECTACULAR DO CHECKMATE */
        .checkmate-animation-container {
            position: relative;
            padding: 30px;
            background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%);
            border-radius: 20px;
            animation: container-pulse 2s infinite;
        }

        @keyframes container-pulse {
            0%, 100% { box-shadow: 0 0 50px rgba(255,0,0,0.3); }
            50% { box-shadow: 0 0 100px rgba(255,0,0,0.6); }
        }

        .checkmate-board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            margin: 20px auto;
            border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            animation: board-shake 0.5s ease-in-out;
        }

        @keyframes board-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .checkmate-square {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            position: relative;
            transition: all 0.3s;
        }

        .checkmate-square.king-fallen {
            animation: king-fall 1.5s ease-out forwards;
        }

        @keyframes king-fall {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 0.8; }
            100% { transform: scale(0) rotate(45deg); opacity: 0; }
        }

        .checkmate-square.checkmate-glow {
            animation: checkmate-square-pulse 1s infinite;
        }

        @keyframes checkmate-square-pulse {
            0%, 100% { box-shadow: inset 0 0 20px #ff0000; }
            50% { box-shadow: inset 0 0 40px #ff0000, inset 0 0 60px #ffaa00; }
        }

        .checkmate-square.winner-glow {
            animation: winner-pulse 1.5s infinite;
        }

        @keyframes winner-pulse {

        let gameState = {
            board: [],

            gameId: null,
            myColor: null,

            isFernando: false,

            castlingRights: { white: {kingSide: true, queenSide: true}, black: {kingSide: true, queenSide: true} },
            enPassantTarget: null,
