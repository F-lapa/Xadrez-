<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .login-screen {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #333;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .login-screen p {
            margin-bottom: 40px;
            opacity: 0.7;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 20px;
            font-size: 1.3em;
            border: 3px solid #444;
            background: #0a0a0a;
            color: white;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #444, #666);
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: linear-gradient(45deg, #555, #777);
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            white-space: pre-line;
            animation: pulse 2s infinite;
        }

        .status-message.waiting {
            display: block;
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .status-message.error {
            display: block;
            background: rgba(255,0,0,0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 0.5s ease;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .game-header h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-badge {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #333, #444);
            border-radius: 25px;
            font-size: 0.95em;
            margin: 5px;
            border: 1px solid #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player-badge.fernando {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000;
            font-weight: bold;
            animation: fernando-glow 2s infinite;
            border: 2px solid #00ff00;
        }

        @keyframes fernando-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,255,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(0,255,0,0.8); }
        }

        .turn-indicator {
            margin-top: 15px;
            padding: 15px 40px;
            background: #222;
            border-radius: 30px;
            font-size: 1.3em;
            transition: all 0.3s;
            display: inline-block;
            font-weight: bold;
            border: 2px solid #444;
        }

        .turn-indicator.your-turn {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            animation: glow 1.5s infinite;
            border-color: #ffd700;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.8); }
        }

        .board-container {
            position: relative;
            margin: 20px 0;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 2px solid #444;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, min(11vw, 85px));
            grid-template-rows: repeat(8, min(11vw, 85px));
            border: 3px solid #555;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .square {
            width: min(11vw, 85px);
            height: min(11vw, 85px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(8vw, 58px);
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.2s;
        }

        .light { background: #f0d9b5; color: #000; }
        .dark { background: #b58863; color: #000; }

        .selected {
            background: rgba(255, 215, 0, 0.9) !important;
            box-shadow: inset 0 0 25px rgba(255,215,0,0.6);
            animation: selected-pulse 1s infinite;
        }

        @keyframes selected-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .valid-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            animation: valid-pulse 1.5s infinite;
        }

        @keyframes valid-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        .valid-capture {
            box-shadow: inset 0 0 0 5px rgba(255,0,0,0.7);
            animation: capture-pulse 1s infinite;
        }

        @keyframes capture-pulse {
            0%, 100% { box-shadow: inset 0 0 0 5px rgba(255,0,0,0.7); }
            50% { box-shadow: inset 0 0 0 8px rgba(255,0,0,0.9); }
        }

        .last-move {
            box-shadow: inset 0 0 0 4px #0066ff;
            animation: last-move-fade 3s forwards;
        }

        @keyframes last-move-fade {
            0% { box-shadow: inset 0 0 0 4px #0066ff; }
            100% { box-shadow: inset 0 0 0 4px rgba(0,102,255,0.3); }
        }

        .check {
            animation: check-pulse 0.8s infinite;
            background: rgba(255,0,0,0.5) !important;
        }

        @keyframes check-pulse {
            0%, 100% { box-shadow: inset 0 0 30px rgba(255,0,0,1); }
            50% { box-shadow: inset 0 0 50px rgba(255,0,0,1); }
        }

        /* ANIMAÇÃO ESPECTACULAR DE CHECKMATE */
        .checkmate-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .checkmate-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.9) 0%, rgba(255,215,0,0.5) 40%, transparent 70%);
            animation: checkmate-flash 2s ease-out forwards;
        }

        @keyframes checkmate-flash {
            0% { opacity: 0; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }

        .checkmate-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffd700;
            border-radius: 50%;
            animation: particle-explode 1.5s ease-out forwards;
            box-shadow: 0 0 10px #ffd700;
        }

        @keyframes particle-explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .checkmate-king-fall {
            animation: king-fall 1.5s ease-in-out forwards;
        }

        @keyframes king-fall {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-15deg) translateY(-10px); }
            50% { transform: rotate(-30deg) translateY(5px); }
            75% { transform: rotate(-45deg) translateY(15px); }
            100% { transform: rotate(-90deg) translateY(30px); opacity: 0.7; }
        }

        .checkmate-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5em;
            font-weight: bold;
            text-shadow: 0 0 30px #ff0000, 0 0 60px #ffd700, 0 0 90px #ff0000;
            animation: checkmate-text-pop 1s ease-out forwards;
            z-index: 101;
            white-space: nowrap;
            text-align: center;
        }

        @keyframes checkmate-text-pop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .checkmate-crown {
            position: absolute;
            font-size: 3.5em;
            animation: crown-float 2s ease-in-out infinite;
            z-index: 102;
            filter: drop-shadow(0 0 20px #ffd700);
        }

        @keyframes crown-float {
            0%, 100% { transform: translateY(0) rotate(-5deg) scale(1); }
            50% { transform: translateY(-25px) rotate(5deg) scale(1.1); }
        }

        .victory-shine {
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%);
            animation: shine-sweep 2s ease-in-out;
            z-index: 99;
        }

        @keyframes shine-sweep {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* ANIMAÇÃO DE CAPTURA EXPLOSIVA */
        .capture-explosion {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .capture-blast {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ff6600, #ff0000, transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: blast-expand 0.6s ease-out forwards;
        }

        @keyframes blast-expand {
            0% { width: 10px; height: 10px; opacity: 1; }
            50% { width: 80px; height: 80px; opacity: 0.8; }
            100% { width: 120px; height: 120px; opacity: 0; }
        }

        .capture-shards {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .shard {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffaa00;
            top: 50%;
            left: 50%;
            animation: shard-fly 0.8s ease-out forwards;
        }

        @keyframes shard-fly {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(0) rotate(720deg); opacity: 0; }
        }

        .captured-piece-fly {
            animation: piece-captured-fly 0.5s ease-in forwards;
        }

        @keyframes piece-captured-fly {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* ANIMAÇÃO DE MOVIMENTO FLUIDO */
        .piece-moving {
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .move-trail {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ff00, #00ff00, transparent);
            transform-origin: left center;
            z-index: 90;
            pointer-events: none;
            opacity: 0.8;
            box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
            border-radius: 2px;
            animation: trail-fade 0.6s ease-out forwards;
        }

        @keyframes trail-fade {
            0% { opacity: 0.8; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(1.5); }
        }

        .ghost-piece {
            position: absolute;
            font-size: min(8vw, 58px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 95;
            animation: ghost-fade 0.5s ease-out forwards;
        }

        @keyframes ghost-fade {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        /* DICAS AVANÇADAS PARA FERNANDO */
        .threat-indicator {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0.4) 50%, transparent 70%);
            animation: threat-flash 0.6s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes threat-flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.15); }
        }

        .danger-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255,0,0,0.15),
                rgba(255,0,0,0.15) 10px,
                rgba(255,0,0,0.25) 10px,
                rgba(255,0,0,0.25) 20px
            );
            animation: danger-zone-pulse 2s infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes danger-zone-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        .blunder-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            animation: blunder-bounce 0.8s infinite;
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
            border: 2px solid #ff6666;
        }

        @keyframes blunder-bounce {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-8px); }
        }

        .safe-move {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #00ff00;
            border-radius: 50%;
            animation: safe-pulse 1.5s infinite;
            z-index: 8;
            pointer-events: none;
            box-shadow: 0 0 20px #00ff00, inset 0 0 20px rgba(0,255,0,0.2);
        }

        @keyframes safe-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.15); opacity: 0.5; }
        }

        .prediction-line {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
            transform-origin: left center;
            z-index: 7;
            pointer-events: none;
            opacity: 0.7;
            animation: prediction-flow 2s linear infinite;
        }

        @keyframes prediction-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .hint-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,0,0.7) 0%, rgba(0,255,0,0.3) 50%, transparent 70%);
            animation: hint-pulse 2s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes hint-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.25); opacity: 0.5; }
        }

        .hint-circle {
            position: absolute;
            width: 85%;
            height: 85%;
            border: 4px solid #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: circle-pulse 1.5s infinite;
            z-index: 11;
            pointer-events: none;
            box-shadow: 0 0 25px #00ff00, inset 0 0 25px rgba(0,255,0,0.3);
        }

        @keyframes circle-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; }
        }

        .hint-arrow {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 12;
            pointer-events: none;
            filter: drop-shadow(0 0 10px #00ff00);
        }

        .arrow-up {
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #00ff00;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-down {
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #00ff00;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            animation: arrow-bounce 1s infinite;
        }

        .arrow-left {
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 25px solid #00ff00;
            left: 3px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        .arrow-right {
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid #00ff00;
            right: 3px;
            top: 50%;
            transform: translateY(-50%);
            animation: arrow-bounce-h 1s infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes arrow-bounce-h {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(-10px); }
        }

        .hint-target {
            position: absolute;
            width: 75%;
            height: 75%;
            border: 3px dashed #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 3s linear infinite;
            z-index: 11;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .hint-trail {
            position: absolute;
            height: 5px;
            background: linear-gradient(90deg, transparent, #00ff00, #00ff00, transparent);
            transform-origin: left center;
            z-index: 9;
            pointer-events: none;
            box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
            border-radius: 3px;
            opacity: 0.9;
            animation: trail-pulse 1s infinite;
        }

        @keyframes trail-pulse {
            0%, 100% { opacity: 0.9; transform: scaleY(1); }
            50% { opacity: 0.6; transform: scaleY(1.3); }
        }

        .killer-move {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,255,0.8) 0%, rgba(255,0,255,0.4) 50%, transparent 70%);
            animation: killer-pulse 1s infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes killer-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .checkmate-threat {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.9) 0%, rgba(255,0,0,0.6) 40%, transparent 70%);
            animation: checkmate-threat-pulse 0.5s infinite;
            z-index: 15;
            pointer-events: none;
        }

        @keyframes checkmate-threat-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .forced-mate-indicator {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            z-index: 20;
            animation: mate-warning 0.5s infinite;
        }

        @keyframes mate-warning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            text-align: center;
            animation: modal-in 0.3s ease;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 25px;
            border: 2px solid #444;

                for (let c = 0; c < 8; c++) {
                    const piece = board2D[r] && board2D[r][c];
                    if (piece) {
                        boardObj[`${r}-${c}`] = piece;
                    }
                }
            }
            return boardObj;
        }

        function boardFromFirestore(boardObj) {
            const board = Array(8).fill(null).map(() => Array(8).fill(null));
            if (!boardObj || typeof boardObj !== 'object') return board;
            
            for (let key in boardObj) {
                if (boardObj.hasOwnProperty(key)) {
                    const [r, c] = key.split('-').map(Number);
                    if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                        board[r][c] = boardObj[key];
                    }
                }
            }
            return board;
        }

        function capturedPiecesToFirestore(captured) {
            return {
                white: Array.isArray(captured.white) ? captured.white.join(',') : (captured.white || ''),
                black: Array.isArray(captured.black) ? captured.black.join(',') : (captured.black || '')
            };
        }

        function capturedPiecesFromFirestore(captured) {
            if (!captured) return { white: [], black: [] };
            
            return {
                white: captured.white ? captured.white.split(',').filter(p => p) : [],
                black: captured.black ? captured.black.split(',').filter(p => p) : []
            };
        }

        function getGameId() {
            const params = new URLSearchParams(window.location.search);
            let gameId = params.get('game');
            
            if (!gameId) {
                gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
                window.history.replaceState({}, '', `?game=${gameId}`);
            }
            
            return gameId;
        }

        function showStatus(message, type = 'waiting') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
        }

        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                showStatus('Digite seu nome!', 'error');
                return;
            }
            const btn = document.getElementById('joinBtn');
            btn.disabled = true;
            btn.textContent = 'Conectando...';
            gameState.myName = name;
            gameState.isFernando = name.toLowerCase() === 'fernando';
            gameState.gameId = getGameId();
            
            const savedState = loadLocalState();
            if (savedState && savedState.gameId === gameState.gameId && savedState.status !== 'ended') {
                restoreGameState(savedState);
            } else {
                connectToGame();
            }
        }

        function restoreGameState(savedState) {
            gameState.myColor = savedState.myColor;
            gameState.isFernando = savedState.isFernando;
            gameState.amPlayer1 = savedState.amPlayer1;
            gameState.board = savedState.board;
            gameState.currentPlayer = savedState.currentPlayer;
            gameState.players = savedState.players;
            gameState.castlingRights = savedState.castlingRights;
            gameState.enPassantTarget = savedState.enPassantTarget;
            gameState.lastMove = savedState.lastMove;
            gameState.kingPositions = savedState.kingPositions;
            gameState.capturedPieces = savedState.capturedPieces;
            gameState.status = savedState.status;
            gameState.moveHistory = savedState.moveHistory || [];
            
            gameRef = db.collection('games').doc(gameState.gameId);
            setupGameListener();
            
            if (gameState.status === 'playing' || gameState.status === 'waiting') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'flex';
                updatePlayerDisplay();
                updateOpponentDisplay();
                renderBoard();
                updateTurnIndicator();
            }
        }

        function connectToGame() {
            gameRef = db.collection('games').doc(gameState.gameId);
            
            gameRef.get().then(doc => {
                if (!doc.exists) {
                    gameState.amPlayer1 = true;
                    gameState.myColor = 'white';
                    createNewGame();
                } else {
                    const game = doc.data();
                    const hasWhite = game.players && game.players.white;
                    const hasBlack = game.players && game.players.black;
                    
                    if (hasWhite && !hasBlack) {
                        gameState.amPlayer1 = false;
                        gameState.myColor = 'black';
                        joinExistingGame(game);
                    } else if (!hasWhite && hasBlack) {
                        gameState.amPlayer1 = true;
                        gameState.myColor = 'white';
                        joinAsWhitePlayer(game);
                    } else if (hasWhite && hasBlack) {
                        if (game.players.white.name === gameState.myName) {
                            gameState.amPlayer1 = true;
                            gameState.myColor = 'white';
                            restorePlayerState(game);
                        } else if (game.players.black.name === gameState.myName) {
                            gameState.amPlayer1 = false;
                            gameState.myColor = 'black';
                            restorePlayerState(game);
                        } else {
                            showStatus('Jogo já está cheio! Crie um novo jogo.', 'error');
                            document.getElementById('joinBtn').disabled = false;
                            document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
                            
                            setTimeout(() => {
                                if (confirm('Jogo cheio. Criar novo jogo?')) {
                                    window.location.search = '';
                                    location.reload();
                                }
                            }, 100);
                        }
                    } else {
                        gameState.amPlayer1 = true;
                        gameState.myColor = 'white';
                        createNewGame();
                    }
                }
            }).catch(error => {
                console.error('Erro ao conectar:', error);
                showStatus('Erro de conexão: ' + error.message, 'error');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
            });
        }

        function restorePlayerState(game) {
            gameState.board = boardFromFirestore(game.board);
            gameState.currentPlayer = game.currentPlayer || 'white';
            gameState.castlingRights = game.castlingRights || { white: {kingSide: true, queenSide: true}, black: {kingSide: true, queenSide: true} };
            gameState.capturedPieces = capturedPiecesFromFirestore(game.capturedPieces);
            gameState.kingPositions = game.kingPositions || { white: {row: 7, col: 4}, black: {row: 0, col: 4} };
            gameState.moveHistory = game.moveHistory || [];
            gameState.players = game.players;
            
            setupGameListener();
            startGame();
        }

        function createNewGame() {
            const initialBoard = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];

            const boardObj = boardToFirestore(initialBoard);
            const capturedObj = capturedPiecesToFirestore({ white: [], black: [] });

            const gameData = {
                board: boardObj,
                currentPlayer: 'white',
                players: {
                    white: { 
                        name: gameState.myName, 
                        isFernando: gameState.isFernando,
                        connected: true,
                        joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    black: null
                },
                status: 'waiting',
                castlingRights: { 
                    white: {kingSide: true, queenSide: true}, 
                    black: {kingSide: true, queenSide: true} 
                },
                enPassantTarget: null,
                lastMove: null,
                capturedPieces: capturedObj,
                kingPositions: { 
                    white: {row: 7, col: 4}, 
                    black: {row: 0, col: 4} 
                },
                moveHistory: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            gameRef.set(gameData).then(() => {
                setupGameListener();
                showStatus(`✅ Jogo criado!\n\nAguardando adversário...\n\n🔗 COMPARTILHE ESTE LINK:\n${window.location.href}`, 'waiting');
                updatePlayerDisplay();
                saveLocalState();
            }).catch(error => {
                console.error('Erro ao criar jogo:', error);
                showStatus('Erro ao criar jogo: ' + error.message, 'error');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
            });
        }

        function joinExistingGame(game) {
            if (!game.players || !game.players.white) {
                showStatus('Erro: Jogo inválido (sem jogador branco)', 'error');
                return;
            }

            const updates = {
                'players.black': { 
                    name: gameState.myName, 
                    isFernando: gameState.isFernando,
                    connected: true,
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                },                status: 'playing',
                startedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            gameRef.update(updates).then(() => {
                gameState.board = boardFromFirestore(game.board);
                gameState.currentPlayer = game.currentPlayer || 'white';
                gameState.castlingRights = game.castlingRights || { white: {kingSide: true, queenSide: true}, black: {kingSide: true, queenSide: true} };
                gameState.capturedPieces = capturedPiecesFromFirestore(game.capturedPieces);
                gameState.kingPositions = game.kingPositions || { white: {row: 7, col: 4}, black: {row: 0, col: 4} };
                gameState.moveHistory = game.moveHistory || [];
                gameState.players = {
                    white: game.players.white,
                    black: { name: gameState.myName, isFernando: gameState.isFernando }
                };
                
                saveLocalState();
                setupGameListener();
                startGame();
            }).catch(error => {
                console.error('Erro ao entrar:', error);
                showStatus('Erro ao entrar no jogo: ' + error.message, 'error');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
            });
        }

        function joinAsWhitePlayer(game) {
            const updates = {
                'players.white': { 
                    name: gameState.myName, 
                    isFernando: gameState.isFernando,
                    connected: true,
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                },
                status: 'playing'
            };

            gameRef.update(updates).then(() => {
                gameState.board = boardFromFirestore(game.board);
                gameState.currentPlayer = game.currentPlayer || 'white';
                gameState.castlingRights = game.castlingRights || { white: {kingSide: true, queenSide: true}, black: {kingSide: true, queenSide: true} };
                gameState.capturedPieces = capturedPiecesFromFirestore(game.capturedPieces);
                gameState.kingPositions = game.kingPositions || { white: {row: 7, col: 4}, black: {row: 0, col: 4} };
                gameState.moveHistory = game.moveHistory || [];
                gameState.players = {
                    white: { name: gameState.myName, isFernando: gameState.isFernando },
                    black: game.players.black
                };
                
                saveLocalState();
                setupGameListener();
                startGame();
            }).catch(error => {
                console.error('Erro ao entrar:', error);
                showStatus('Erro ao entrar no jogo: ' + error.message, 'error');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Entrar no Jogo';
            });
        }

        function setupGameListener() {
            if (!gameRef) return;
            
            unsubscribe = gameRef.onSnapshot(doc => {
                if (!doc.exists) return;
                
                const data = doc.data();
                
                // Verificar checkmate
                const myKing = gameState.myColor === 'white' ? 'K' : 'k';
                const opponentKing = gameState.myColor === 'white' ? 'k' : 'K';
                const board = boardFromFirestore(data.board);
                
                let myKingExists = false;
                let opponentKingExists = false;
                
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (board[r] && board[r][c] === myKing) myKingExists = true;
                        if (board[r] && board[r][c] === opponentKing) opponentKingExists = true;
                    }
                }
                
                if (!myKingExists && gameState.status !== 'ended') {
                    gameState.status = 'ended';
                    gameState.winner = gameState.myColor === 'white' ? 'black' : 'white';
                    gameState.finalPosition = board.map(r => [...r]);
                    saveLocalState();
                    showCheckmateAnimation(gameState.winner);
                    return;
                }
                
                if (!opponentKingExists && gameState.status !== 'ended') {
                    gameState.status = 'ended';
                    gameState.winner = gameState.myColor;
                    gameState.finalPosition = board.map(r => [...r]);
                    saveLocalState();
                    showCheckmateAnimation(gameState.winner);
                    return;
                }
                
                gameState.board = board;
                gameState.currentPlayer = data.currentPlayer || 'white';
                gameState.players = data.players || gameState.players;
                gameState.castlingRights = data.castlingRights || gameState.castlingRights;
                gameState.enPassantTarget = data.enPassantTarget;
                gameState.lastMove = data.lastMove;
                gameState.capturedPieces = capturedPiecesFromFirestore(data.capturedPieces);
                gameState.kingPositions = data.kingPositions || gameState.kingPositions;
                gameState.status = data.status || 'waiting';
                gameState.moveHistory = data.moveHistory || [];

                if (data.status === 'playing' && gameState.amPlayer1 && 
                    document.getElementById('loginScreen').style.display !== 'none') {
                    document.getElementById('statusMessage').style.display = 'none';
                    startGame();
                }

                if (data.status === 'ended' && data.winner) {
                    gameState.finalPosition = board.map(r => [...r]);
                    gameState.gameEndedAt = Date.now();
                    saveLocalState();
                    if (!isCheckmateAnimating) {
                        showCheckmateAnimation(data.winner);
                    }
                }

                saveLocalState();
                
                requestAnimationFrame(() => {
                    renderBoard();
                    updateTurnIndicator();
                    updateOpponentDisplay();
                    
                    if (gameState.isFernando && gameState.status === 'playing') {
                        updateAIAnalysis();
                    }
                });
            }, error => {
                console.error('Erro no listener:', error);
            });
        }

        function startGame() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            updatePlayerDisplay();
            updateOpponentDisplay();
            renderBoard();
        }

        function updatePlayerDisplay() {
            const badge = document.getElementById('playerBadge');
            const nameDisplay = document.getElementById('playerNameDisplay');
            nameDisplay.textContent = gameState.myName;
            if (gameState.isFernando) {
                badge.textContent = '♔ MODO PRO ♔';
                badge.classList.add('fernando');
                document.getElementById('aiAnalysis').classList.add('show');
            } else {
                badge.textContent = `Jogando com ${gameState.myColor === 'white' ? 'Brancas ♔' : 'Pretas ♚'}`;
            }
        }

        function updateOpponentDisplay() {
            const opponentBadge = document.getElementById('opponentBadge');
            const opponent = gameState.myColor === 'white' ? gameState.players.black : gameState.players.white;
            if (opponent && opponent.name) {
                opponentBadge.style.display = 'inline-block';
                opponentBadge.textContent = `Adversário: ${opponent.name} ${opponent.isFernando ? '👑' : ''}`;
            }
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            const isMyTurn = gameState.currentPlayer === gameState.myColor;
            if (gameState.status === 'waiting') {
                indicator.textContent = 'Aguardando adversário...';
                indicator.classList.remove('your-turn');
            } else if (isMyTurn) {
                indicator.textContent = '⚡ SUA VEZ ⚡';
                indicator.classList.add('your-turn');
            } else {
                indicator.textContent = '⏳ Vez do adversário...';
                indicator.classList.remove('your-turn');
            }
        }
